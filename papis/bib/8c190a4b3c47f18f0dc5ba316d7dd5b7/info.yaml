abstract: Forecasting is required in many situations. Stocking an inventory may require
  forecasts of demand months in advance. Telecommunication routing requires traffic
  forecasts a few minutes ahead. Whatever the circumstances or time horizons involved,
  forecasting is an important aid in effective and efficient planning.This textbook
  provides a comprehensive introduction to forecasting methods and presents enough
  information about each method for readers to use them sensibly.
